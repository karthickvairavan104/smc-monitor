server:
  port: ${PORT:8081}

spring:
  application:
    name: smc-monitor-backend

  data:
    mongodb:
      uri: "${MONGODB_URI:mongodb+srv://karthickvairavan104_db_user:Karthick%40104@smcmonitor.5yxplkf.mongodb.net/?appName=smcmonitor}"
      database: smcmonitor

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  threads:
    virtual:
      enabled: true

  task:
    scheduling:
      pool:
        size: 10

jwt:
  secret: ${JWT_SECRET:changeme-use-256bit-secret-in-production}
  expiration-ms: 86400000

google:
  client-id: "${GOOGLE_CLIENT_ID:946257596210-1r977764fl0iqft7h827kh57iicqajku.apps.googleusercontent.com}"

smc:
  scan:
    interval-ms: 60000
    price-check-ms: 30000
    min-score: 6
    max-trade-hours: 48
  alert:
    email-enabled: ${ALERT_EMAIL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  deployment:
    slot: ${DEPLOYMENT_SLOT:blue}
    version: ${APP_VERSION:1.0.0}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://your-app.vercel.app}
	